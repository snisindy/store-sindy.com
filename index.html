<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNI sindy - ศูนย์รวมแอปพรีเมียมของแท้ราคาถูก</title>
    
    <meta name="description" content="ร้านค้าขายแอปพรีเมียม SNI sindy แคนวาโปร แคปคัทโปร ราคาประหยัด ปลอดภัย ส่งไวอัตโนมัติ">
    <meta name="keywords" content="ขายแอปพรีเมียม, แคนวาโปร, แคปคัทโปร, Canva Pro ราคาถูก, CapCut Pro, SNI sindy, แอปส่งออโต้">
    
    <link rel="icon" type="image/jpeg" href="https://s.imgz.io/2026/07/21/IMG_6481018b99c0e19bc4b2.jpeg">
    <link rel="apple-touch-icon" href="https://s.imgz.io/2026/07/21/IMG_6481018b99c0e19bc4b2.jpeg">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111111; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .blur-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .custom-loader { border: 2px solid #f3f3f3; border-top: 2px solid #000000; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32 bg-white selection:bg-black selection:text-white">

    <nav class="fixed top-0 left-0 right-0 z-40 border-b border-gray-100 blur-nav">
        <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://s.imgz.io/2026/07/21/IMG_6481018b99c0e19bc4b2.jpeg" alt="SNI sindy Logo" class="w-9 h-9 rounded-full object-cover border border-gray-200">
                <span class="font-bold text-base tracking-tight text-black">SNI sindy</span>
            </div>
            <button onclick="toggleCartModal(true)" class="relative p-2.5 text-gray-900 hover:bg-gray-50 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4m-3 11.25h16.5m-16.5 0a2.25 2.25 0 01-2.25-2.25V8.528c0-.83.57-1.543 1.391-1.685l11.57-2.02a2.25 2.25 0 012.44 2.23v8.122A2.25 2.25 0 0121.75 21M4.5 21h16.5" />
                </svg>
                <span id="globalCartCount" class="absolute top-1 right-1 bg-black text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <div id="actionLoadingOverlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center hidden">
        <div class="custom-loader mb-3"></div>
        <p id="loadingText" class="text-xs font-medium text-gray-500 tracking-wider">กำลังติดต่อระบบฐานข้อมูล...</p>
    </div>

    <main class="pt-24 px-4 max-w-4xl mx-auto space-y-8">
        <div id="shopBanner" class="w-full h-44 bg-gray-50 border border-gray-100 rounded-2xl bg-cover bg-center transition-all duration-500"></div>

        <section class="grid grid-cols-3 gap-3">
            <div class="p-4 bg-gray-50/50 border border-gray-100 rounded-xl text-center">
                <p class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">ยอดขายร้าน</p>
                <p id="dashboardSales" class="text-base font-bold text-black mt-1">฿0</p>
            </div>
            <div class="p-4 bg-gray-50/50 border border-gray-100 rounded-xl text-center">
                <p class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">สต๊อกทั้งหมด</p>
                <p id="dashboardTotalStock" class="text-base font-bold text-black mt-1">0</p>
            </div>
            <div class="p-4 bg-gray-50/50 border border-gray-100 rounded-xl text-center">
                <p class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">สินค้าพร้อมขาย</p>
                <p id="dashboardAvailableStock" class="text-base font-bold text-black mt-1">0</p>
            </div>
        </section>

        <div id="dynamicPopupList" class="space-y-2"></div>

        <section class="bg-gray-50/40 border border-gray-100 rounded-xl p-4">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">รายการสั่งซื้อล่าสุด</h3>
            <div id="recentOrdersFeed" class="space-y-2 max-h-24 overflow-y-auto no-scrollbar text-xs text-gray-600"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest border-l-2 border-black pl-3 mb-4 text-black">สินค้าแนะนำ</h2>
            <div id="recommendedContainer" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
        </section>

        <section class="space-y-6">
            <h2 class="text-sm font-bold uppercase tracking-widest border-l-2 border-black pl-3 text-black">สินค้าทั้งหมด</h2>
            <div id="categorizedProductsContainer" class="space-y-8"></div>
        </section>
    </main>

    <footer class="mt-24 py-12 border-t border-gray-100 text-center space-y-3">
        <p class="text-xs font-medium tracking-wide text-gray-400">SNI sindy - Premium Application Store</p>
        <div class="flex justify-center gap-4 text-xs text-black font-semibold">
            <a href="mailto:support@snisindy.com" class="hover:underline">ติดต่อแอดมิน</a>
            <span class="text-gray-200">|</span>
            <a href="#" onclick="alert('ชื่อบัญชีธนาคารรับชำระเงิน: คิงแอดส์ เท่านั้น')" class="hover:underline">ข้อมูลความปลอดภัย</a>
        </div>
    </footer>

    <div id="cartModalWrapper" class="fixed inset-0 bg-black/40 z-50 hidden transition-opacity duration-300">
        <div class="absolute bottom-0 left-0 right-0 max-w-xl mx-auto bg-white rounded-t-3xl p-6 h-[85vh] flex flex-col shadow-2xl transition-transform duration-300 translate-y-full" id="cartContentPanel">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                <div>
                    <h3 class="text-lg font-bold text-black">ตะกร้าสินค้า</h3>
                    <p class="text-xs text-gray-400 mt-0.5">โปรดตรวจสอบรายการก่อนชำระเงิน</p>
                </div>
                <button onclick="toggleCartModal(false)" class="p-2 hover:bg-gray-100 rounded-full text-gray-400 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="cartItemsList" class="flex-1 overflow-y-auto no-scrollbar py-4 space-y-3"></div>

            <div class="border-t border-gray-100 pt-4 space-y-4">
                <div class="flex justify-between items-center text-black font-bold">
                    <span class="text-sm font-medium text-gray-500">ยอดชำระสุทธิ</span>
                    <span id="cartTotalPriceLabel" class="text-xl">฿0</span>
                </div>

                <div class="space-y-3">
                    <input type="email" id="customerInputEmail" placeholder="ระบุอีเมลสำหรับรับรหัสสินค้า" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:border-black transition" required>
                    <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 flex flex-col items-center">
                        <img src="https://s.imgz.io/2026/07/15/IMG_75242612165b6fd16c31.jpeg" alt="QR Code" class="w-36 h-36 object-cover rounded-lg border shadow-sm">
                        <p class="text-xs font-bold text-black mt-2">บัญชี: คิงแอดส์</p>
                    </div>
                    <label class="block w-full text-center bg-black text-white font-bold py-3.5 px-4 rounded-xl text-sm cursor-pointer hover:bg-gray-900 transition">
                        อัปโหลดสลิปเพื่อสั่งซื้อทันที
                        <input type="file" id="slipFileInputButton" accept="image/*" class="hidden">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // กรุณานำ URL ที่ได้จากการ Deploy ของ Google Apps Script มาวางแทนที่ด้านล่างนี้
        // (URL ต้องลงท้ายด้วยคำว่า /exec เสมอ)
        // =========================================================================
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzgMZa2XfTbVwP_khG9GoKr0IeVPB-H7tFgRlHbsaC3mKiZydHgtzF8pSFqs2rY8sTj/exec'; 

        let storeState = { products: [], cart: [], isProcessing: false };

        async function runStoreApp() {
            toggleLoadingView(true, "กำลังโหลดข้อมูลร้านค้า...");
            try {
                // แก้ไขปัญหาเรื่อง CORS ด้วยเทคนิค text/plain และ redirect follow
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'init' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    redirect: 'follow'
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    storeState.products = result.products;
                    setupDashboardStats(result.stats);
                    setupPopups(result.popups);
                    setupRecentOrders(result.recentBuys);
                    renderProductDisplay();
                    if (result.settings.Banner_URL) {
                        document.getElementById('shopBanner').style.backgroundImage = `url('${result.settings.Banner_URL}')`;
                    }
                } else {
                    alert('ข้อผิดพลาดจากเซิร์ฟเวอร์:\n' + result.message);
                }
            } catch (err) {
                console.error(err);
                alert('เชื่อมต่อล้มเหลว โปรดตรวจสอบว่า URL ถูกต้องและกดยืนยันสิทธิ์ Apps Script แล้ว\nรายละเอียด: ' + err.message);
            } finally {
                toggleLoadingView(false);
            }
        }

        function setupDashboardStats(stats) {
            document.getElementById('dashboardSales').innerText = `฿${stats.totalSales.toLocaleString()}`;
            document.getElementById('dashboardTotalStock').innerText = stats.totalStock.toLocaleString();
            document.getElementById('dashboardAvailableStock').innerText = storeState.products.reduce((acc, p) => acc + p.stock, 0).toLocaleString();
        }

        function setupPopups(popups) {
            const container = document.getElementById('dynamicPopupList');
            container.innerHTML = popups.map(msg => `
                <div class="p-3 bg-gray-50 border border-gray-100 text-xs font-medium text-black rounded-xl flex justify-between items-center">
                    <div class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-black rounded-full"></span><span>${msg}</span></div>
                    <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-black font-bold">&times;</button>
                </div>
            `).join('');
        }

        function setupRecentOrders(orders) {
            const container = document.getElementById('recentOrdersFeed');
            if (!orders || orders.length === 0) return container.innerHTML = '<p class="text-gray-400 italic">ไม่มีรายการคำสั่งซื้อล่าสุด</p>';
            container.innerHTML = orders.map(o => `
                <div class="flex justify-between items-center py-1 border-b border-gray-50 last:border-0">
                    <span class="font-mono text-gray-400">ออเดอร์ #${o.orderId}</span>
                    <span class="font-bold text-black">฿${o.amount} (${o.time} น.)</span>
                </div>
            `).join('');
        }

        function renderProductDisplay() {
            const recContainer = document.getElementById('recommendedContainer');
            const catContainer = document.getElementById('categorizedProductsContainer');
            recContainer.innerHTML = ''; catContainer.innerHTML = '';
            
            const categories = {};
            storeState.products.forEach(p => {
                if (!categories[p.category]) categories[p.category] = [];
                categories[p.category].push(p);

                if (p.recommended) {
                    recContainer.innerHTML += createProductCard(p, true);
                }
            });

            if (recContainer.innerHTML === '') recContainer.innerHTML = '<p class="text-xs text-gray-400 italic">ไม่มีสินค้าแนะนำ</p>';

            Object.keys(categories).forEach(cat => {
                catContainer.innerHTML += `
                    <div class="space-y-3">
                        <h3 class="text-xs font-bold uppercase text-gray-400 tracking-widest">${cat}</h3>
                        <div class="grid grid-cols-2 gap-3">${categories[cat].map(p => createProductCard(p, false)).join('')}</div>
                    </div>
                `;
            });
        }

        function createProductCard(p, isRecommended) {
            return `
                <div class="${isRecommended ? 'w-48 flex-shrink-0' : ''} bg-white border border-gray-100 rounded-xl overflow-hidden flex flex-col">
                    <div class="h-28 bg-gray-50 relative">
                        ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : ''}
                        ${p.stock <= 0 ? `<div class="absolute inset-0 bg-white/80 flex items-center justify-center text-xs font-bold text-red-500">หมด</div>` : ''}
                    </div>
                    <div class="p-3 flex flex-col flex-1">
                        <h4 class="font-bold text-xs truncate">${p.name}</h4>
                        <div class="pt-2 mt-auto flex justify-between items-center">
                            <span class="font-bold text-xs">฿${p.price}</span>
                            <button onclick="addItemToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-7 h-7 bg-black text-white rounded-full flex items-center justify-center disabled:bg-gray-200">+</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function addItemToCart(id) {
            const product = storeState.products.find(p => p.id === id.toString());
            if (!product || product.stock <= 0) return;

            const cartItem = storeState.cart.find(c => c.id === id.toString());
            if (cartItem) {
                if (cartItem.qty < product.stock) cartItem.qty++;
                else alert('สินค้าเกินสต๊อก');
            } else {
                storeState.cart.push({ ...product, qty: 1 });
            }
            refreshCartState();
        }

        function refreshCartState() {
            const count = storeState.cart.reduce((s, i) => s + i.qty, 0);
            const total = storeState.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('globalCartCount').innerText = count;
            document.getElementById('cartTotalPriceLabel').innerText = `฿${total.toLocaleString()}`;

            const list = document.getElementById('cartItemsList');
            if (storeState.cart.length === 0) return list.innerHTML = '<p class="text-center text-xs text-gray-400 mt-10">ตะกร้าว่างเปล่า</p>';

            list.innerHTML = storeState.cart.map((item, idx) => `
                <div class="flex justify-between p-3 bg-gray-50 rounded-xl">
                    <div>
                        <h5 class="font-bold text-xs">${item.name}</h5>
                        <p class="text-[10px] text-gray-400">฿${item.price} x ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-xs">฿${(item.price * item.qty).toLocaleString()}</span>
                        <button onclick="storeState.cart.splice(${idx}, 1); refreshCartState();" class="text-gray-400 hover:text-black font-bold">&times;</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCartModal(open) {
            const w = document.getElementById('cartModalWrapper');
            const p = document.getElementById('cartContentPanel');
            if (open) { w.classList.remove('hidden'); setTimeout(() => p.classList.remove('translate-y-full'), 10); } 
            else { p.classList.add('translate-y-full'); setTimeout(() => w.classList.add('hidden'), 300); }
        }

        const parseFileToBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => res(reader.result); reader.onerror = e => rej(e);
        });

        // ดักจับและประมวลผลทันทีเมื่อผู้ใช้งานอัปโหลดรูปภาพ
        document.getElementById('slipFileInputButton').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const email = document.getElementById('customerInputEmail').value.trim();
            const totalAmount = storeState.cart.reduce((s, i) => s + (i.price * i.qty), 0);

            if (storeState.cart.length === 0) return alert('ตะกร้าว่างเปล่า'), this.value = '';
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert('โปรดใส่อีเมลที่ถูกต้อง'), this.value = '';
            if (!file) return;
            
            if (storeState.isProcessing) return;
            storeState.isProcessing = true;
            toggleLoadingView(true, "กำลังประมวลผลคำสั่งซื้อ...");

            try {
                const base64Data = (await parseFileToBase64(file)).split(',')[1];
                const res = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'checkout', email, cart: storeState.cart.map(i => ({id: i.id, qty: i.qty})), slipBase64: base64Data, slipMimeType: file.type, totalAmount }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    redirect: 'follow'
                });
                
                const result = await res.json();
                if (result.status === 'success') {
                    alert('สั่งซื้อสำเร็จ! ' + result.message);
                    storeState.cart = [];
                    refreshCartState();
                    toggleCartModal(false);
                    document.getElementById('customerInputEmail').value = '';
                    await runStoreApp();
                } else {
                    alert('ข้อผิดพลาด: ' + result.message);
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ\n' + err.message);
            } finally {
                this.value = ''; storeState.isProcessing = false; toggleLoadingView(false);
            }
        });

        function toggleLoadingView(show, text) {
            document.getElementById('actionLoadingOverlay').classList.toggle('hidden', !show);
            if(text) document.getElementById('loadingText').innerText = text;
        }

        // ระบบฉีด PWA Manifest เพื่อให้รองรับ Add to Home Screen แบบจำลอง
        (function injectPWA() {
            const m = { "name": "SNI sindy", "start_url": ".", "display": "standalone", "background_color": "#ffffff", "icons": [{"src": "https://s.imgz.io/2026/07/21/IMG_6481018b99c0e19bc4b2.jpeg", "sizes": "192x192", "type": "image/jpeg"}] };
            const l = document.createElement('link'); l.rel = 'manifest'; l.href = URL.createObjectURL(new Blob([JSON.stringify(m)], {type: 'application/json'}));
            document.head.appendChild(l);
        })();

        // รันฟังก์ชันตอนโหลดหน้าเว็บเสร็จ
        window.addEventListener('DOMContentLoaded', runStoreApp);
    </script>
</body>
</html>
